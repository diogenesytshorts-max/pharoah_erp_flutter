name: pharoah_erp
description: Pharoah ERP Professional Billing Software for Android and iOS.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Date and Currency formatting
  intl: ^0.19.0
  
  # App Settings and series persistence
  shared_preferences: ^2.2.2
  
  # Local File System Storage (JSON Files)
  path_provider: ^2.1.2
  
  # State Management (Data Sharing)
  provider: ^6.1.1
  
  # Professional PDF Generation (Landscape Support)
  pdf: ^3.10.7
  
  # Printing and Sharing PDF
  printing: ^5.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  

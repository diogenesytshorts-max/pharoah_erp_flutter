name: pharoah_erp
description: Pharoah ERP Professional Billing & GST Inventory Software.
version: 1.0.5+1
publish_to: 'none'

environment:
  # Is line ko update kiya gaya hai (Dart 3 compatibility ke liye)
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  provider: ^6.1.1
  pdf: ^3.10.7
  printing: ^5.11.0
  share_plus: ^7.2.2

  # --- CSV AUR IMPORT KE LIYE YE DO LINES ---
  csv: ^6.0.0
  file_picker: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png

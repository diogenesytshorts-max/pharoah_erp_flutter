name: pharoah_erp
description: Pharoah ERP Professional Billing Software.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  provider: ^6.1.1
  pdf: ^3.10.7
  printing: ^5.11.0
  share_plus: ^7.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  # Logo generator tool
  flutter_launcher_icons: ^0.13.1

# LOGO SETTINGS
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  # Assets folder activate karna
  assets:
    - assets/logo.png

name: pharoah_erp
description: Pharoah ERP Professional Billing & GST Inventory Software.
version: 1.0.8+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  provider: ^6.1.1
  pdf: ^3.10.7
  printing: ^5.11.0
  share_plus: ^7.2.2
  csv: ^6.0.0
  file_picker: ^8.1.2
  file_saver: ^0.2.11
  image_picker: ^1.0.7
  google_mlkit_text_recognition: ^0.11.0
  http: ^1.2.0

# ⚠️ THE ULTIMATE FIX: BLOCKING NEW CRASHING VERSIONS
dependency_overrides:
  shared_preferences_android: 2.3.2
  image_picker_android: 0.1.4+1
  flutter_plugin_android_lifecycle: 2.0.22

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png

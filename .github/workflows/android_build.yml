name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Isse aap manual button dabakar bhi build start kar sakte hain

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin' # Zyaada stable hai
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # Specific version ki bajaye hamesha latest stable use karein
          
      - name: Get Dependencies
        run: |
          flutter clean
          flutter pub get
        
      - name: Build Release APK
        # --no-tree-shake-icons zaroori hai agar icons mein error aaye
        run: flutter build apk --release --no-tree-shake-icons
        
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

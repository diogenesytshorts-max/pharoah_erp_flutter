name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin' # Zulu ki jagah Temurin use karein
          java-version: '17'
          
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Clean and Get Dependencies
        run: |
          flutter clean
          flutter pub get
        
      - name: Build APK
        # Isme --no-tree-shake-icons tabhi use karein agar icon build me issue ho
        run: flutter build apk --release --no-tree-shake-icons
        
      - name: Upload APK
        uses: actions/artifact@v4 # 'actions/upload-artifact@v4' ka short form
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
